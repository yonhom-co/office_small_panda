# 本地开发基础设施
# 用法：docker compose up -d
# 含 Postgres / Redis / Qdrant / MinIO + 本地 bge-m3 embedding 服务
# 真实密钥在 .env（不入库）；本文件只用 ${VAR} 引用

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raccoon
      POSTGRES_PASSWORD: raccoon
      POSTGRES_DB: raccoon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raccoon"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # 本地 embedding 服务（bge-m3），因 ARK 账号无可用 embedding 模型
  # 通过 sentence-transformers 暴露 OpenAI 兼容的 /v1/embeddings
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    command: ["--model-id", "BAAI/bge-m3", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - embeddata:/data

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
  embeddata:
